<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Infinity Stream — Console</title>
  <meta name="description" content="Infinity Stream — Kafka + Algolia + Pusher alternative in Rust." />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="login-view" class="login-wrap hidden">
    <form id="login-form" class="login-card" autocomplete="on">
      <div class="brand-lg"><span class="infinity">∞</span> Infinity&nbsp;Stream</div>
      <p class="muted">Streaming, realtime fan-out, and BM25 search.</p>
      <label>Email</label><input id="login-email" type="email" required value="admin@infinity.local" />
      <label>Password</label><input id="login-password" type="password" required placeholder="••••••••" />
      <button type="submit" class="btn primary full">Sign in</button>
      <div id="login-error" class="error"></div>
    </form>
    <div class="login-footer muted">Infinity Stack · Open source · Apache-2.0</div>
  </div>
  <div id="app-view" class="app hidden">
    <aside class="sidebar">
      <div class="brand"><span class="infinity">∞</span> Infinity Stream</div>
      <nav>
        <a class="nav-item active" data-view="overview">Overview</a>
        <a class="nav-item" data-view="topics">Topics</a>
        <a class="nav-item" data-view="search">Search</a>
        <a class="nav-item" data-view="consumers">Consumers</a>
        <a class="nav-item" data-view="keys">Keys</a>
        <a class="nav-item" data-view="settings">Settings</a>
      </nav>
      <div class="sidebar-foot"><div id="who" class="who"></div><button id="logout" class="btn ghost sm">Sign out</button></div>
    </aside>
    <main class="content">
      <header class="topbar"><h1 id="view-title">Overview</h1><div id="toast" class="toast"></div></header>
      <section id="view-root" class="view-root"></section>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
